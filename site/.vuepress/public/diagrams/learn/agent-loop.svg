<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" role="img" aria-labelledby="title desc">
  <title id="title">Agent 的最小工作循环</title>
  <desc id="desc">用户目标进入上下文，模型判断是否需要工具。需要工具时执行 Tool 并观察结果，观察结果回到模型进入下一轮；不需要工具时输出结果。</desc>
  <defs>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c2410c"/>
    </marker>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 H 0 V 24" fill="none" stroke="#dbe5e8" stroke-width="1" opacity="0.55"/>
    </pattern>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0f766e" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1180" height="640" rx="18" fill="#fbfefd"/>
  <rect width="1180" height="640" rx="18" fill="url(#grid)"/>
  <path d="M0 0 H420 C280 118 180 270 120 640 H0 Z" fill="#ccfbf1" opacity="0.24"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="58" y="56" fill="#0f766e" font-size="15" font-weight="800">AGENT LOOP</text>
    <text x="58" y="92" fill="#111827" font-size="32" font-weight="850">Agent 的最小工作循环</text>
    <text x="58" y="122" fill="#64748b" font-size="17">目标进入上下文；模型判断下一步；工具结果写回后进入下一轮。</text>

    <g filter="url(#soft-shadow)">
      <rect x="70" y="174" width="190" height="86" rx="18" fill="#e6fffb" stroke="#0f766e" stroke-width="2"/>
      <path d="M84 188 C130 178 199 179 246 188" fill="none" stroke="#0f766e" stroke-width="1.2" opacity="0.28"/>
      <text x="165" y="210" fill="#134e4a" font-size="23" font-weight="850" text-anchor="middle">用户目标</text>
      <text x="165" y="239" fill="#64748b" font-size="14" text-anchor="middle">任务、约束、验收标准</text>
    </g>

    <g filter="url(#soft-shadow)">
      <rect x="315" y="174" width="220" height="86" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
      <path d="M329 188 C388 178 462 179 521 188" fill="none" stroke="#2563eb" stroke-width="1.2" opacity="0.25"/>
      <text x="425" y="210" fill="#1e3a8a" font-size="23" font-weight="850" text-anchor="middle">装载上下文</text>
      <text x="425" y="239" fill="#64748b" font-size="14" text-anchor="middle">项目文件、规则、Memory</text>
    </g>

    <g filter="url(#soft-shadow)">
      <rect x="590" y="174" width="190" height="86" rx="16" fill="#fff7ed" stroke="#c2410c" stroke-width="2"/>
      <path d="M604 188 C650 178 720 179 766 188" fill="none" stroke="#c2410c" stroke-width="1.2" opacity="0.24"/>
      <text x="685" y="210" fill="#7c2d12" font-size="23" font-weight="850" text-anchor="middle">模型推理</text>
      <text x="685" y="239" fill="#64748b" font-size="14" text-anchor="middle">计划下一步动作</text>
    </g>

    <g filter="url(#soft-shadow)">
      <path d="M900 153 L990 217 L900 281 L810 217 Z" fill="#fefce8" stroke="#a16207" stroke-width="2"/>
      <path d="M900 166 C937 188 962 203 978 217" fill="none" stroke="#a16207" stroke-width="1.1" opacity="0.22"/>
      <text x="900" y="211" fill="#713f12" font-size="22" font-weight="850" text-anchor="middle">需要工具？</text>
    </g>

    <g filter="url(#soft-shadow)">
      <ellipse cx="1080" cy="217" rx="78" ry="45" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
      <text x="1080" y="211" fill="#334155" font-size="22" font-weight="850" text-anchor="middle">输出结果</text>
      <text x="1080" y="238" fill="#64748b" font-size="13" text-anchor="middle">完成或请求确认</text>
    </g>

    <g filter="url(#soft-shadow)">
      <rect x="790" y="388" width="220" height="90" rx="18" fill="#ecfdf5" stroke="#0f766e" stroke-width="2"/>
      <path d="M804 402 C867 391 933 393 996 402" fill="none" stroke="#0f766e" stroke-width="1.2" opacity="0.23"/>
      <text x="900" y="425" fill="#134e4a" font-size="23" font-weight="850" text-anchor="middle">执行 Tool</text>
      <text x="900" y="456" fill="#64748b" font-size="14" text-anchor="middle">读文件、跑命令、改代码</text>
    </g>

    <g filter="url(#soft-shadow)">
      <rect x="520" y="388" width="220" height="90" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
      <path d="M534 402 C593 391 667 393 726 402" fill="none" stroke="#2563eb" stroke-width="1.2" opacity="0.23"/>
      <text x="630" y="425" fill="#1e3a8a" font-size="23" font-weight="850" text-anchor="middle">观察结果</text>
      <text x="630" y="456" fill="#64748b" font-size="14" text-anchor="middle">stdout、diff、截图</text>
    </g>

    <path d="M274 217 H300" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow-teal)"/>
    <path d="M550 217 H576" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow-teal)"/>
    <path d="M794 217 H802" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow-teal)"/>
    <path d="M994 217 H1000" fill="none" stroke="#475569" stroke-width="3" marker-end="url(#arrow-slate)"/>
    <path d="M900 286 V374" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow-teal)"/>
    <path d="M778 433 H754" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow-teal)"/>
    <path d="M630 388 C630 326 685 326 685 274" fill="none" stroke="#c2410c" stroke-width="3" stroke-dasharray="9 9" marker-end="url(#arrow-orange)"/>

    <rect x="848" y="315" width="34" height="22" rx="11" fill="#fff7ed"/>
    <text x="865" y="331" fill="#a16207" font-size="13" font-weight="800" text-anchor="middle">是</text>
    <rect x="1010" y="191" width="34" height="22" rx="11" fill="#f8fafc"/>
    <text x="1027" y="207" fill="#475569" font-size="13" font-weight="800" text-anchor="middle">否</text>
    <rect x="562" y="330" width="58" height="24" rx="12" fill="#fff7ed"/>
    <text x="591" y="347" fill="#c2410c" font-size="13" font-weight="800" text-anchor="middle">下一轮</text>
    <rect x="276" y="204" width="44" height="22" rx="11" fill="#ecfdf5"/>
    <text x="298" y="220" fill="#0f766e" font-size="12" font-weight="800" text-anchor="middle">输入</text>
  </g>
</svg>
